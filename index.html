<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8/3 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff0f5,#ffe4e1);
font-family:'Montserrat',sans-serif;
overflow:hidden;
}

/* CARD */

.card{
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.2);
text-align:center;
max-width:900px;
width:90%;
}

h1{
font-family:'Dancing Script',cursive;
font-size:3rem;
color:#d81b60;
margin-bottom:20px;
}

/* MESSAGE */

.message{
font-size:1.1rem;
line-height:1.7;
color:#444;
margin-bottom:30px;
}

/* TREE */

#tree{
position:relative;
height:400px;
display:flex;
justify-content:center;
align-items:flex-end;
}

#trunk{
width:50px;
height:200px;
background:linear-gradient(#5d4037,#3e2723);
border-radius:20px;
position:absolute;
bottom:0;
}

.branch{
position:absolute;
width:90px;
height:12px;
background:#5d4037;
top:80px;
border-radius:10px;
}

.left{
left:-70px;
transform:rotate(-30deg);
}

.right{
right:-70px;
transform:rotate(30deg);
}

/* HEART TREE */

#canopy{
position:absolute;
bottom:120px;
width:600px;
height:300px;
}

.heart{
position:absolute;
width:20px;
height:20px;
transform:rotate(45deg);
opacity:0;
animation:bloom 1s forwards;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:20px;
height:20px;
background:inherit;
border-radius:50%;
}

.heart:before{
top:-10px;
left:0;
}

.heart:after{
left:-10px;
top:0;
}

@keyframes bloom{
0%{
transform:scale(0) rotate(45deg);
opacity:0;
}
100%{
transform:scale(1) rotate(45deg);
opacity:1;
}
}

/* FLOAT HEART */

.float-heart{
position:absolute;
color:#ff4081;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-800px);
opacity:0;
}
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3b8c2e8e7a.mp3" type="audio/mpeg">
</audio>

<div class="card">

<h1>Happy Women's Day 8/3 ❤️</h1>

<div class="message">
Chúc bạn một ngày 8/3 thật hạnh phúc.<br>
Luôn xinh đẹp, vui vẻ và gặp nhiều may mắn.<br>
Cảm ơn vì đã xuất hiện và làm thế giới trở nên dễ thương hơn 🌸
</div>

<div id="tree">

<div id="trunk">
<div class="branch left"></div>
<div class="branch right"></div>
</div>

<div id="canopy"></div>

</div>

</div>

<script>

const canopy=document.getElementById("canopy")

const colors=[
"#ffb6c1","#ff69b4","#ff4081",
"#ffc0cb","#d81b60","#ff1744"
]

function createHeart(){

const heart=document.createElement("div")

heart.className="heart"

heart.style.background=colors[Math.floor(Math.random()*colors.length)]

const x=Math.random()*580
const y=Math.random()*280

heart.style.left=x+"px"
heart.style.top=y+"px"

canopy.appendChild(heart)

}

for(let i=0;i<350;i++){
setTimeout(createHeart,i*20)
}

/* FLOAT HEART */

function floating(){

const heart=document.createElement("div")

heart.className="float-heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"%"

heart.style.bottom="-20px"

heart.style.fontSize=(20+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

setInterval(floating,500)

</script>

</body>
</html>
