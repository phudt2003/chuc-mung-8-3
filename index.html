<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chúc Mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#fff0f5,#ffe4e1);
overflow-x:hidden;
}

.card{

background:rgba(255,255,255,0.9);
padding:40px 30px;
border-radius:30px;
box-shadow:0 20px 60px rgba(216,27,96,0.15);
text-align:center;

max-width:900px;
width:90%;

border:2px solid rgba(255,182,193,0.6);

opacity:0;
display:none;

transition:1s;
}

h1{
font-family:'Dancing Script',cursive;
color:#d81b60;
font-size:3rem;
margin-bottom:15px;
}

.wish-text{
font-size:1.1rem;
color:#444;
line-height:1.8;
margin-bottom:20px;
}

.fade-in-line{
opacity:0;
transform:translateY(20px);
}

.fade-in-line.active{
animation:fadeIn 1s forwards;
}

@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

/* cây */

#tree{

position:relative;
width:100%;
max-width:520px;

aspect-ratio:6/5;

margin:10px auto 30px auto;

opacity:0;
display:none;

transition:1s;

}

#tree-svg{

position:absolute;
width:100%;
height:100%;

top:0;
left:0;

z-index:2;

}

#heart-canopy{

position:absolute;
width:100%;
height:100%;

top:0;
left:0;

z-index:3;

}

#tree-svg line{

stroke:#5c3a21;
stroke-linecap:round;

stroke-dasharray:1000;
stroke-dashoffset:1000;

animation:draw 2s forwards;

}

@keyframes draw{

to{
stroke-dashoffset:0;
}

}

/* trái tim */

.heart-leaf{

position:absolute;

width:20px;
height:20px;

margin-top:-10px;
margin-left:-10px;

opacity:0;

animation:bloom 1s forwards;

}

.heart-leaf:before,
.heart-leaf:after{

content:"";
position:absolute;

width:20px;
height:20px;

background:inherit;

border-radius:50% 50% 0 0;

}

.heart-leaf:before{

left:10px;
transform:rotate(-45deg);
transform-origin:0 100%;

}

.heart-leaf:after{

left:0;
transform:rotate(45deg);
transform-origin:100% 100%;

}

@keyframes bloom{

0%{
transform:scale(0);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* hoa rơi */

#falling{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

pointer-events:none;

}

.fall{

position:absolute;
top:-20px;

animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(0) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* music */

.music{

margin-top:20px;

background:white;

border-radius:40px;

padding:10px 20px;

display:flex;
align-items:center;
gap:10px;

max-width:420px;

margin-left:auto;
margin-right:auto;

}

audio{
width:100%;
}

/* responsive */

@media(max-width:768px){

h1{
font-size:2rem;
}

#tree{
max-width:380px;
}

}

</style>

</head>

<body>

<div id="falling"></div>

<div class="card" id="card">

<h1>Chúc Mừng 8/3 ❤️</h1>

<div class="wish-text">

<p class="fade-in-line" data-delay="0.5">
Chúc em luôn xinh đẹp và hạnh phúc.
</p>

<p class="fade-in-line" data-delay="1">
Có một người luôn âm thầm chúc em mỗi ngày.
</p>

<p class="fade-in-line" data-delay="1.5">
Chỉ mong mỗi ngày của em đều rực rỡ như những trái tim này.
</p>

<p class="fade-in-line" data-delay="2">
Chúc em luôn tỏa sáng theo cách riêng của mình ❤️
</p>

</div>

<div id="tree">

<svg id="tree-svg" viewBox="0 0 600 500"></svg>

<div id="heart-canopy"></div>

</div>

<div class="music">

<span>🎵 Perfect - Ed Sheeran</span>

<audio controls autoplay loop>

<source src="Perfect.mp3" type="audio/mpeg">

</audio>

</div>

</div>

<script>

const card=document.getElementById("card")

setTimeout(()=>{

card.style.display="block"

setTimeout(()=>card.style.opacity=1,50)

},300)

const lines=document.querySelectorAll(".fade-in-line")

lines.forEach(line=>{

const delay=line.dataset.delay

setTimeout(()=>{

line.classList.add("active")

},delay*1000)

})

/* hoa rơi */

const fall=document.getElementById("falling")

const items=["🌸","💖","❤️","✨"]

setInterval(()=>{

const el=document.createElement("div")

el.className="fall"

el.innerText=items[Math.floor(Math.random()*items.length)]

el.style.left=Math.random()*100+"vw"

el.style.fontSize=Math.random()*20+15+"px"

el.style.animationDuration=Math.random()*5+4+"s"

fall.appendChild(el)

setTimeout(()=>el.remove(),9000)

},300)

/* vẽ cây */

const svg=document.getElementById("tree-svg")

function branch(x,y,len,angle,depth,width){

if(depth==0)return

const x2=x+len*Math.cos(angle)

const y2=y+len*Math.sin(angle)

const line=document.createElementNS("http://www.w3.org/2000/svg","line")

line.setAttribute("x1",x)
line.setAttribute("y1",y)

line.setAttribute("x2",x2)
line.setAttribute("y2",y2)

line.style.strokeWidth=width

svg.appendChild(line)

branch(x2,y2,len*0.75,angle-0.4,depth-1,width*0.7)

branch(x2,y2,len*0.75,angle+0.4,depth-1,width*0.7)

}

function growTree(){

branch(300,460,100,-Math.PI/2,7,18)

branch(300,460,50,Math.PI/3,3,14)

branch(300,460,50,2*Math.PI/3,3,14)

branch(300,460,30,Math.PI/2,2,16)

}

setTimeout(()=>{

const tree=document.getElementById("tree")

tree.style.display="block"

setTimeout(()=>tree.style.opacity=1,50)

growTree()

setTimeout(createHearts,1500)

},3500)

/* tạo trái tim */

const colors=[

"#ff4d4d","#ff80df","#33ccff","#ffcc00","#cc33ff",

"#ff9933","#ff1a75","#0099ff","#ffb366","#d81b60"

]

function createHearts(){

const canopy=document.getElementById("heart-canopy")

const total=320

for(let i=0;i<total;i++){

setTimeout(()=>{

const heart=document.createElement("div")

heart.className="heart-leaf"

heart.style.background=colors[Math.floor(Math.random()*colors.length)]

const angle=Math.random()*Math.PI*2
const r=Math.sqrt(Math.random())

const rx=240*r
const ry=150*r

const x=300+Math.cos(angle)*rx
let y=170+Math.sin(angle)*ry

if(Math.sin(angle)>0){
y=170+Math.sin(angle)*ry*0.5
}

heart.style.left=(x/600*100)+"%"
heart.style.top=(y/500*100)+"%"

canopy.appendChild(heart)

},i*15)

}

}

</script>

</body>
</html>
