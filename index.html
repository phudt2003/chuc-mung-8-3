<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Love Tree</title>

<style>

body{
margin:0;
height:100vh;
background:radial-gradient(circle,#1a0010,#000);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
text-align:center;
}

/* chữ */
.title{
position:absolute;
top:60px;
font-size:50px;
text-shadow:0 0 20px #ff2e63;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* thân cây */
.tree{
position:absolute;
bottom:0;
width:20px;
height:250px;
background:#4b2e2e;
border-radius:10px;
}

/* tán cây */
.leaves{
position:absolute;
bottom:200px;
width:400px;
height:300px;
}

/* trái tim lá */
.heart-leaf{
position:absolute;
color:#ff4d6d;
font-size:22px;
animation:grow 2s ease forwards;
}

@keyframes grow{
0%{
transform:scale(0);
opacity:0;
}
70%{
transform:scale(1.2);
opacity:1;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* tim bay */
.fly-heart{
position:absolute;
font-size:20px;
animation:fly 6s linear forwards;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}
}

/* tim tỏa */
.burst{
position:absolute;
left:50%;
top:50%;
animation:burst 2s linear forwards;
}

@keyframes burst{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(1.5);
opacity:0;
}
}

</style>
</head>

<body>

<div class="title">💖 Love For You 💖</div>

<div class="tree"></div>
<div class="leaves" id="leaves"></div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3d8f8a9e4f.mp3">
</audio>

<script>

/* tạo lá trái tim */

let leaves=document.getElementById("leaves")

for(let i=0;i<200;i++){

let heart=document.createElement("div")

heart.className="heart-leaf"
heart.innerHTML="❤️"

heart.style.left=Math.random()*400+"px"
heart.style.top=Math.random()*250+"px"
heart.style.animationDelay=Math.random()*2+"s"

leaves.appendChild(heart)

}

/* tim bay khắp màn hình */

function flyHeart(){

let heart=document.createElement("div")

heart.className="fly-heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*20+20)+"px"
heart.style.animationDuration=(Math.random()*4+4)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},8000)

}

setInterval(flyHeart,400)

/* tim tỏa từ giữa */

function burstHeart(){

let heart=document.createElement("div")

heart.className="burst"
heart.innerHTML="💗"

let x=(Math.random()-0.5)*500+"px"
let y=(Math.random()-0.5)*500+"px"

heart.style.setProperty("--x",x)
heart.style.setProperty("--y",y)

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

}

setInterval(burstHeart,300)

</script>

</body>
</html>
