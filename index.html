<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Ngày 8/3 🌸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #ffd3e0 0%, #fbc2eb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 2px solid #ffb6c1;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }

        p {
            color: #555;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .music-player {
            margin-top: 20px;
            padding: 15px;
            background: #fff0f5;
            border-radius: 15px;
            border: 1px dashed #ff69b4;
        }

        .music-title {
            font-weight: 600;
            color: #d81b60;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        /* Tùy chỉnh thanh audio */
        audio {
            width: 100%;
            outline: none;
        }

        .flower {
            font-size: 3rem;
            display: inline-block;
            animation: rotateFlower 5s infinite linear;
        }

        @keyframes rotateFlower {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="flower">🌸</div>
        <h1>Chúc Mừng 8/3!</h1>
        <p>Chúc bạn có một ngày Quốc tế Phụ nữ thật nhiều niềm vui, luôn xinh đẹp và hạnh phúc. Đối với thế giới này, bạn luôn là một điều "Perfect" nhất! ❤️</p>
        
        <div class="music-player">
            <div class="music-title">🎵 Đang phát: Perfect - Ed Sheeran</div>
            <audio controls autoplay loop>
                <source src="perfect.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ phát nhạc.
            </audio>
        </div>
    </div>

</body>
</html>
