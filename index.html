<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
perspective:1000px;
color:white;
text-align:center;
}

/* chữ 3D */
h1{
font-size:60px;
text-shadow:0 5px 10px rgba(0,0,0,0.2);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0) rotateX(0deg);}
50%{transform:translateY(-20px) rotateX(10deg);}
100%{transform:translateY(0) rotateX(0deg);}
}

p{
font-size:22px;
}

/* trái tim 3D */
.heart{
position:absolute;
font-size:24px;
animation:heartMove linear forwards;
transform:translateZ(0);
}

@keyframes heartMove{
0%{
transform:translateY(100vh) translateZ(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-10vh) translateZ(200px) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div>
<h1>🌹 Chúc Mừng 8/3 🌹</h1>
<p>Chúc bạn luôn xinh đẹp, hạnh phúc và thành công 💖</p>
<p>From: Người bí mật 😄</p>
</div>

<!-- nhạc nền -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

function createHeart(){
let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";
heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
