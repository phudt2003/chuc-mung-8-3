<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Ngàn Lời Chúc 8/3 - Lấp Lánh 🌸</title>
    <style>
        /* --- 1. FONTS & RESET --- */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 100%);
            cursor: pointer;
        }

        /* --- 2. HIỆU ỨNG NỀN --- */
        #falling-container, #fireworks-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .falling-element {
            position: absolute;
            top: -50px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* --- 3. HƯỚNG DẪN --- */
        #start-instruction {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 1.5rem;
            color: #d81b60;
            font-weight: 600;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.2);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.05); }
        }

        /* --- 4. THE CARD (THIỆP CHÍNH) --- */
        .card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(216, 27, 96, 0.15);
            text-align: center;
            max-width: 850px;
            width: 95%;
            border: 2px solid rgba(255, 182, 193, 0.6);
            z-index: 10;
            display: none; 
            flex-direction: column; 
            align-items: center;
            opacity: 0;
            transition: opacity 1s ease-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 10px;
        }

        .wish-text {
            color: #444;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .fade-in-line { opacity: 0; transform: translateY(20px); }
        .fade-in-line.active { animation: fadeInLine 0.8s ease-out forwards; }

        @keyframes fadeInLine { to { opacity: 1; transform: translateY(0); } }

        /* --- 5. CÂY VÀ RỄ (SVG) --- */
        #tree {
            position: relative;
            width: 100%;
            max-width: 550px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            opacity: 0;
            transition: opacity 1s ease-out;
            z-index: 5;
        }

        #tree-svg {
            width: 100%; height: 100%;
            overflow: visible;
        }

        #tree-svg line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: growLine 1.5s ease-out forwards;
        }

        @keyframes growLine { to { stroke-dashoffset: 0; } }

        #heart-canopy {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .heart-leaf {
            position: absolute;
            width: 18px; height: 18px;
            opacity: 0;
            animation: bloom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        .heart-leaf::before, .heart-leaf::after {
            content: ''; position: absolute; top: 0; width: 18px; height: 18px;
            border-radius: 50% 50% 0 0; background: inherit;
        }
        .heart-leaf::before { left: 9px; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart-leaf::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        @keyframes bloom {
            0% { transform: scale(0) rotate(var(--random-rot)); opacity: 0; }
            100% { transform: scale(var(--random-scale)) rotate(var(--random-rot)); opacity: 1; }
        }

        /* --- 6. TRÌNH PHÁT NHẠC (ĐÃ FIX ĐÈ NHAU) --- */
        .music-section {
            width: 100%;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(216, 27, 96, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20; /* Đảm bảo nằm trên cùng */
        }

        .music-wrapper {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            border: 1px solid rgba(216, 27, 96, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(216, 27, 96, 0.1);
        }

        .song-info { color: #d81b60; font-weight: 600; font-size: 0.9rem; }
        audio { height: 35px; width: 220px; }

        /* --- 7. PHÁO HOA --- */
        .firework {
            position: absolute; width: 4px; height: 4px;
            border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body id="body">

    <div id="start-instruction">👆 Chạm để mở thiệp 💝</div>

    <div id="falling-container"></div>
    <div id="fireworks-container"></div>

    <div class="card" id="card">
        <h1>Happy Women's Day!</h1>
        
        <div class="wish-text">
            <p class="fade-in-line" data-delay="0.5">Chúc mừng ngày Quốc tế Phụ nữ 8/3.</p>
            <p class="fade-in-line" data-delay="1.2">Chúc các chị em luôn xinh đẹp, tự tin và tỏa sáng! ❤️</p>
        </div>

        <div id="tree">
            <svg id="tree-svg" viewBox="0 0 600 600"></svg>
            <div id="heart-canopy"></div>
        </div>
        
        <div class="music-section fade-in-line" data-delay="2.5">
            <div class="music-wrapper">
                <div class="song-info">🎵 Perfect - Ed Sheeran</div>
                <audio id="audio-player" controls loop>
                    <source src="Perfect.mp3" type="audio/mpeg">
                </audio>
            </div>
            <p style="margin-top: 10px; color:#999; font-size: 0.8rem;">
                Chạm vào cây để bắn pháo hoa nhé!
            </p>
        </div>
    </div>

    <script>
        const body = document.getElementById('body');
        const card = document.getElementById('card');
        const instruction = document.getElementById('start-instruction');
        const audio = document.getElementById('audio-player');
        const treeSvg = document.getElementById('tree-svg');
        const heartCanopy = document.getElementById('heart-canopy');
        const heartColors = ['#ff4d4d', '#ff80df', '#33ccff', '#ffcc00', '#cc33ff', '#ff1a75', '#0099ff', '#d81b60'];

        let isStarted = false;

        body.addEventListener('click', (e) => {
            // Tránh kích hoạt khi bấm vào các nút điều khiển nhạc
            if (e.target.closest('.music-wrapper')) return;
            
            if (!isStarted) {
                isStarted = true;
                instruction.style.display = 'none';
                card.style.display = 'flex';
                setTimeout(() => card.style.opacity = '1', 50);
                
                audio.play().catch(err => console.log("Auto-play cần tương tác người dùng"));

                document.querySelectorAll('.fade-in-line').forEach(line => {
                    setTimeout(() => line.classList.add('active'), line.dataset.delay * 1000);
                });

                // Hiện cây
                setTimeout(() => {
                    document.getElementById('tree').style.opacity = '1';
                    startFractalTree();
                }, 1500);
            } else if (e.target.closest('#tree')) {
                createFirework(e.clientX, e.clientY);
            }
        });

        // Hàm vẽ Fractal cho cả cành và rễ
        function drawFractal(x, y, len, angle, depth, width, isRoot) {
            if (depth === 0) return;

            const x2 = x + len * Math.cos(angle);
            const y2 = y + len * Math.sin(angle);

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x);
            line.setAttribute('y1', y);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            
            // Rễ màu đậm hơn, thân màu nâu gỗ
            line.style.stroke = isRoot ? '#3d2b1f' : '#5c3a21';
            line.style.strokeWidth = width;
            line.style.strokeLinecap = 'round';
            
            // Trình tự mọc
            const delay = isRoot ? 0.1 : (7 - depth) * 0.15;
            line.style.animationDelay = `${delay}s`;

            treeSvg.appendChild(line);

            // Nhánh tẽ
            const branches = isRoot ? 2 : (Math.random() > 0.7 ? 3 : 2);
            for (let i = 0; i < branches; i++) {
                const newAngle = angle + (Math.random() - 0.5) * (isRoot ? 0.8 : 1.2);
                const newLen = len * (0.65 + Math.random() * 0.2);
                drawFractal(x2, y2, newLen, newAngle, depth - 1, width * 0.7, isRoot);
            }
        }

        function startFractalTree() {
            treeSvg.innerHTML = '';
            heartCanopy.innerHTML = '';

            // Vẽ Rễ (Hướng xuống - sâu và nét hơn)
            drawFractal(300, 420, 45, Math.PI / 2.2, 4, 12, true);
            drawFractal(300, 420, 45, Math.PI / 1.8, 4, 12, true);
            
            // Vẽ Thân & Cành (Hướng lên)
            drawFractal(300, 420, 95, -Math.PI / 2, 7, 18, false);

            // Sau khi cây mọc, bung lá
            setTimeout(() => {
                for (let i = 0; i < 400; i++) {
                    setTimeout(createHeartLeaf, i * 4);
                }
            }, 1200);
        }

        function createHeartLeaf() {
            const heart = document.createElement('div');
            heart.classList.add('heart-leaf');
            heart.style.background = heartColors[Math.floor(Math.random() * heartColors.length)];
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.sqrt(Math.random()) * 230;
            const x = 300 + Math.cos(angle) * radius;
            const y = 180 + Math.sin(angle) * radius * 0.8;

            heart.style.left = (x / 600 * 100) + '%';
            heart.style.top = (y / 600 * 100) + '%';
            heart.style.setProperty('--random-rot', Math.random() * 360 + 'deg');
            heart.style.setProperty('--random-scale', Math.random() * 0.5 + 0.5);
            heartCanopy.appendChild(heart);
        }

        function createFirework(x, y) {
            const color = heartColors[Math.floor(Math.random() * heartColors.length)];
            for (let i = 0; i < 15; i++) {
                const f = document.createElement('div');
                f.classList.add('firework');
                f.style.left = x + 'px'; f.style.top = y + 'px';
                f.style.background = color;
                f.style.boxShadow = `0 0 10px ${color}`;
                
                const tx = (Math.random() - 0.5) * 200;
                const ty = (Math.random() - 0.5) * 200;
                
                f.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' });
                
                document.body.appendChild(f);
                setTimeout(() => f.remove(), 800);
            }
        }

        // Hoa rơi nền
        setInterval(() => {
            const el = document.createElement('div');
            el.className = 'falling-element';
            el.innerText = ['🌸','✨','💖'][Math.floor(Math.random()*3)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 3 + 5) + 's';
            document.getElementById('falling-container').appendChild(el);
            setTimeout(() => el.remove(), 8000);
        }, 400);
    </script>
</body>
</html>
