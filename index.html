<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Ngày 8/3</title>
    <style>
        /* Thiết lập giao diện cơ bản */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffe6f2; /* Màu nền hồng nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* Cho phép cuộn nếu màn hình nhỏ */
        }

        .container {
            background-color: rgba(255, 255, 255, 0.95); /* Hơi trong suốt một chút */
            width: 90%;
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10; /* Đảm bảo nội dung nằm trên cánh hoa rơi */
            margin: 40px 0;
        }

        /* Lời chúc */
        .greetings h1 {
            color: #d81b60;
            margin-bottom: 10px;
        }

        .greetings p {
            color: #555;
            line-height: 1.6;
            margin: 5px 0;
            font-size: 16px;
        }

        /* Khu vực vẽ cây */
        #treeCanvas {
            display: block;
            margin: 10px auto 30px auto; /* Tăng margin-bottom để cách xa trình phát nhạc */
            max-width: 100%;
        }

        /* Trình phát nhạc */
        .player-container {
            background-color: #fff0f5;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.15);
            position: relative;
            z-index: 20; 
        }

        .player-container audio {
            height: 40px;
            outline: none;
        }

        .player-text {
            color: #d81b60;
            font-weight: bold;
            font-size: 14px;
        }

        /* =========================================
           CSS CHO HIỆU ỨNG CÁNH HOA RƠI 
           ========================================= */
        .petal {
            position: fixed;
            top: -10%;
            background-color: #ffb7c5; /* Màu hồng nhạt cánh hoa */
            /* Tạo hình dáng cánh hoa (hình giọt nước) */
            border-radius: 15px 0 15px 15px; 
            width: 12px;
            height: 12px;
            z-index: 1; /* Nằm dưới container */
            pointer-events: none; /* Không cản trở click chuột */
            animation: fall linear forwards;
        }

        /* Chuyển động rơi và xoay */
        @keyframes fall {
            0% {
                top: -10%;
                transform: translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                top: 110%; /* Rơi khuất xuống dưới màn hình */
                transform: translateX(100px) rotate(360deg); /* Vừa rơi vừa bay chéo và xoay */
                opacity: 0.2;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="greetings">
            <h1>Chúc Mừng Ngày 8/3 - Chị Em Toả Sáng!</h1>
            <p>Chúc mừng ngày 8/3 - chị em luôn toả sáng.</p>
            <p>Chúc các chị em rạng rỡ và ngập tràn quà và hoa.</p>
            <p>Chúc các chị em luôn xinh đẹp và hoàn hảo theo cách của riêng mình! ❤️</p>
        </div>

        <canvas id="treeCanvas" width="600" height="450"></canvas>

        <div class="player-container">
            <span class="player-text">🎵 Perfect - Ed Sheeran</span>
            <audio controls autoplay loop>
                <source src="your-audio-file.mp3" type="audio/mpeg">
                Trình duyệt của bạn không hỗ trợ thẻ audio.
            </audio>
        </div>
    </div>

    <script>
        /* =========================================
           PHẦN 1: VẼ CÂY (CANVAS)
           ========================================= */
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');
        const leafColors = ['#ff4081', '#ff79b0', '#e040fb', '#ffeb3b', '#00e5ff', '#ff5252'];

        function drawTree() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Đẩy gốc cây lên cao hẳn để chừa chỗ cho rễ và tách biệt với nhạc
            let startX = canvas.width / 2;
            let startY = canvas.height - 100; 

            // Vẽ cành (hướng lên)
            drawBranch(startX, startY, 85, -Math.PI / 2, 14, 6);

            // Vẽ rễ (hướng xuống)
            // Thay đổi góc bắt đầu để rễ tỏa ngang ra 2 bên thay vì đâm thẳng xuống
            drawRoots(startX, startY, 30, Math.PI / 2 - 0.5, 12, 3); // Rễ chéo trái
            drawRoots(startX, startY, 30, Math.PI / 2 + 0.5, 12, 3); // Rễ chéo phải
            drawRoots(startX, startY, 20, Math.PI / 2, 14, 2);       // Rễ chùm ngắn ở giữa
        }

        function drawBranch(startX, startY, length, angle, branchWidth, depth) {
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            let endX = startX + length * Math.cos(angle);
            let endY = startY + length * Math.sin(angle);

            ctx.lineWidth = branchWidth;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#6d4c41';
            ctx.lineTo(endX, endY);
            ctx.stroke();

            if (depth === 0) {
                drawLeaves(endX, endY);
                return;
            }

            drawBranch(endX, endY, length * 0.75, angle - 0.35, branchWidth * 0.7, depth - 1);
            drawBranch(endX, endY, length * 0.75, angle + 0.35, branchWidth * 0.7, depth - 1);
            
            if (Math.random() > 0.5) {
                drawBranch(endX, endY, length * 0.6, angle, branchWidth * 0.6, depth - 1);
            }
        }

        function drawRoots(startX, startY, length, angle, branchWidth, depth) {
            if (depth === 0) return;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            
            let randomAngle = angle + (Math.random() - 0.5) * 0.3;
            let endX = startX + length * Math.cos(randomAngle);
            let endY = startY + length * Math.sin(randomAngle);

            // Giới hạn siêu an toàn: Rễ cách đáy canvas ít nhất 20px
            let safeBottomY = canvas.height - 20; 
            if (endY > safeBottomY) {
                endY = safeBottomY; 
                length = endY - startY; 
            }

            ctx.lineWidth = branchWidth;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#5c4033';
            
            ctx.lineTo(endX, endY);
            ctx.stroke();

            if (endY >= safeBottomY) return;

            // Rễ tỏa rộng hơn và ngắn dần rất nhanh
            drawRoots(endX, endY, length * 0.7, angle - 0.5, branchWidth * 0.6, depth - 1);
            drawRoots(endX, endY, length * 0.7, angle + 0.5, branchWidth * 0.6, depth - 1);
        }

        function drawLeaves(x, y) {
            let numLeaves = Math.floor(Math.random() * 4) + 2; 
            for (let i = 0; i < numLeaves; i++) {
                ctx.beginPath();
                let leafX = x + (Math.random() - 0.5) * 20;
                let leafY = y + (Math.random() - 0.5) * 20;
                let leafSize = Math.random() * 8 + 6; 

                ctx.fillStyle = leafColors[Math.floor(Math.random() * leafColors.length)];
                ctx.ellipse(leafX, leafY, leafSize, leafSize * 0.7, Math.random() * Math.PI, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        /* =========================================
           PHẦN 2: HIỆU ỨNG CÁNH HOA RƠI 
           ========================================= */
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            // Vị trí xuất hiện ngẫu nhiên theo chiều ngang (0 đến 100vw)
            petal.style.left = Math.random() * 100 + 'vw';
            
            // Thời gian rơi ngẫu nhiên (từ 4s đến 8s) để tạo độ tự nhiên
            petal.style.animationDuration = Math.random() * 4 + 4 + 's';
            
            // Kích thước cánh hoa ngẫu nhiên một chút
            let scale = Math.random() * 0.5 + 0.5; // Kích thước từ 50% đến 100%
            petal.style.transform = `scale(${scale})`;
            
            // Độ mờ ngẫu nhiên
            petal.style.opacity = Math.random() * 0.5 + 0.5;

            document.body.appendChild(petal);

            // Tự động xóa cánh hoa sau khi rơi xong (8000ms) để không làm nặng máy
            setTimeout(() => {
                petal.remove();
            }, 8000);
        }

        window.onload = () => {
            drawTree();
            
            // Tạo cánh hoa liên tục mỗi 300 mili-giây
            setInterval(createPetal, 300);
        };

    </script>
</body>
</html>
