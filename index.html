<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc mừng 8/3</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial;
    overflow:hidden;
}

h1{
    color:white;
    font-size:50px;
    text-align:center;
    text-shadow:0 0 10px #ff4d6d;
}

p{
    color:white;
    font-size:20px;
    text-align:center;
}

.heart{
    position:absolute;
    color:red;
    font-size:20px;
    animation:bay 5s linear infinite;
}

@keyframes bay{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div>
<h1>🌹 Chúc Mừng 8/3 🌹</h1>
<p>Chúc bạn luôn xinh đẹp, hạnh phúc và thành công trong cuộc sống 💖</p>
<p>From: Người bí mật 😄</p>
</div>

<script>
function taoTraiTim(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+10+"px";
    heart.style.animationDuration=Math.random()*3+3+"s";
    document.body.appendChild(heart);

    setTimeout(()=>{heart.remove()},5000);
}

setInterval(taoTraiTim,300);
</script>

</body>
</html>
