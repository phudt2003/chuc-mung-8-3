<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8/3</title>

<style>

body{
margin:0;
height:100vh;
background:radial-gradient(circle,#ff4d6d,#1a0010);
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
overflow:hidden;
color:white;
text-align:center;
}

.box{
z-index:10;
}

h1{
font-size:55px;
text-shadow:0 0 20px #ff4d6d;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-20px);}
100%{transform:translateY(0);}
}

#text{
font-size:22px;
margin-top:20px;
}

/* tim bay */
.heart{
position:absolute;
animation:fly linear forwards;
}

@keyframes fly{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh) rotate(360deg);
opacity:0;
}
}

/* tim tỏa */
.burst{
position:absolute;
left:50%;
top:50%;
animation:burst 2s linear forwards;
}

@keyframes burst{
0%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
100%{
transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(1.5);
opacity:0;
}
}

/* tim giữa */
.centerHeart{
position:absolute;
font-size:80px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

</style>
</head>

<body>

<div class="box">
<h1>🌹 Happy Women's Day 🌹</h1>
<div id="text"></div>
<p>From: Người bí mật ❤️</p>
</div>

<div class="centerHeart">💖</div>

<!-- nhạc Perfect -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3d8f8a9e4f.mp3">
</audio>

<script>

/* chữ chạy chậm */
let message="Chúc bạn luôn xinh đẹp, hạnh phúc và thành công 💖";
let i=0;

function typing(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typing,120);
}
}

typing();

/* tim bay */
function createHeart(){

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,400);

/* tim tỏa từ giữa */
function burstHeart(){

let heart=document.createElement("div");

heart.className="burst";
heart.innerHTML="💖";

let x=(Math.random()-0.5)*400+"px";
let y=(Math.random()-0.5)*400+"px";

heart.style.setProperty("--x",x);
heart.style.setProperty("--y",y);

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},2000);

}

setInterval(burstHeart,300);

</script>

</body>
</html>
